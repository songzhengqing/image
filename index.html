<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星星特效 - 菲菲天天开心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 50%, #0c0c1e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
        }

        #textCanvas {
            position: absolute;
            visibility: hidden;
        }
    </style>
</head>
<body>
    <canvas id="textCanvas"></canvas>
    <canvas id="starCanvas"></canvas>

    <script>
        const textCanvas = document.getElementById('textCanvas');
        const textCtx = textCanvas.getContext('2d');
        const starCanvas = document.getElementById('starCanvas');
        const starCtx = starCanvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;

        textCanvas.width = starCanvas.width = width;
        textCanvas.height = starCanvas.height = height;

        const text = '菲菲天天开心';
        let targetPoints = [];
        let stars = [];
        let animationPhase = 'scatter';
        let phaseTimer = 0;
        const scatterDuration = 3000;
        const gatherDuration = 4000;
        const holdDuration = 3000;

        class Star {
            constructor(targetX, targetY) {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.targetX = targetX;
                this.targetY = targetY;
                this.size = Math.random() * 2 + 1;
                this.baseSize = this.size;
                this.speed = Math.random() * 0.5 + 0.3;
                this.twinkleSpeed = Math.random() * 0.1 + 0.05;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.color = this.getRandomColor();
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.arrived = false;
                this.trail = [];
                this.maxTrail = 5;
            }

            getRandomColor() {
                const colors = [
                    { r: 255, g: 255, b: 255 },
                    { r: 255, g: 223, b: 186 },
                    { r: 186, g: 225, b: 255 },
                    { r: 255, g: 182, b: 193 },
                    { r: 255, g: 255, b: 186 },
                    { r: 230, g: 230, b: 250 },
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update(progress) {
                this.twinklePhase += this.twinkleSpeed;
                this.size = this.baseSize + Math.sin(this.twinklePhase) * 0.5;

                if (animationPhase === 'scatter') {
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                    
                    this.x += (Math.random() - 0.5) * 0.5;
                    this.y += (Math.random() - 0.5) * 0.5;
                } else if (animationPhase === 'gather') {
                    const easeProgress = this.easeInOutCubic(progress);
                    const startX = this.x;
                    const startY = this.y;
                    
                    this.x = this.x + (this.targetX - this.x) * easeProgress * this.speed * 0.1;
                    this.y = this.y + (this.targetY - this.y) * easeProgress * this.speed * 0.1;
                    
                    this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                    if (this.trail.length > this.maxTrail) {
                        this.trail.shift();
                    }

                    const dist = Math.sqrt(
                        Math.pow(this.x - this.targetX, 2) + 
                        Math.pow(this.y - this.targetY, 2)
                    );
                    if (dist < 2) {
                        this.arrived = true;
                    }
                } else if (animationPhase === 'hold') {
                    this.x = this.targetX + (Math.random() - 0.5) * 0.3;
                    this.y = this.targetY + (Math.random() - 0.5) * 0.3;
                }
            }

            easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }

            draw() {
                this.trail.forEach((point, index) => {
                    const alpha = (index / this.trail.length) * 0.3;
                    starCtx.beginPath();
                    starCtx.arc(point.x, point.y, this.size * 0.5, 0, Math.PI * 2);
                    starCtx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                    starCtx.fill();
                });

                const gradient = starCtx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 1)`);
                gradient.addColorStop(0.3, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.6)`);
                gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);

                starCtx.beginPath();
                starCtx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                starCtx.fillStyle = gradient;
                starCtx.fill();

                starCtx.beginPath();
                starCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                starCtx.fillStyle = `rgba(255, 255, 255, 0.9)`;
                starCtx.fill();

                if (this.arrived || animationPhase === 'hold') {
                    this.drawRays();
                }
            }

            drawRays() {
                starCtx.save();
                starCtx.translate(this.x, this.y);
                starCtx.rotate(this.twinklePhase * 0.5);

                for (let i = 0; i < 4; i++) {
                    starCtx.rotate(Math.PI / 4);
                    const gradient = starCtx.createLinearGradient(0, 0, this.size * 4, 0);
                    gradient.addColorStop(0, `rgba(255, 255, 255, 0.8)`);
                    gradient.addColorStop(1, `rgba(255, 255, 255, 0)`);

                    starCtx.beginPath();
                    starCtx.moveTo(0, -0.5);
                    starCtx.lineTo(this.size * 4, 0);
                    starCtx.lineTo(0, 0.5);
                    starCtx.closePath();
                    starCtx.fillStyle = gradient;
                    starCtx.fill();
                }

                starCtx.restore();
            }
        }

        function getTextPoints() {
            const fontSize = Math.min(width / 6, 120);
            textCtx.font = `bold ${fontSize}px "Microsoft YaHei", "SimHei", sans-serif`;
            textCtx.textAlign = 'center';
            textCtx.textBaseline = 'middle';
            textCtx.fillStyle = 'white';
            textCtx.fillText(text, width / 2, height / 2);

            const imageData = textCtx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const points = [];
            const gap = 4;

            for (let y = 0; y < height; y += gap) {
                for (let x = 0; x < width; x += gap) {
                    const index = (y * width + x) * 4;
                    if (data[index + 3] > 128) {
                        points.push({ x, y });
                    }
                }
            }

            textCtx.clearRect(0, 0, width, height);
            return points;
        }

        function createStars() {
            targetPoints = getTextPoints();
            stars = [];
            
            const totalStars = Math.min(targetPoints.length, 2000);
            const step = Math.ceil(targetPoints.length / totalStars);
            
            for (let i = 0; i < targetPoints.length; i += step) {
                const point = targetPoints[i];
                stars.push(new Star(point.x, point.y));
            }
        }

        let startTime = Date.now();

        function animate() {
            starCtx.fillStyle = 'rgba(12, 12, 30, 0.15)';
            starCtx.fillRect(0, 0, width, height);

            const currentTime = Date.now();
            const elapsed = currentTime - startTime;
            let progress = 0;

            if (animationPhase === 'scatter') {
                if (elapsed > scatterDuration) {
                    animationPhase = 'gather';
                    startTime = currentTime;
                }
            } else if (animationPhase === 'gather') {
                progress = Math.min(elapsed / gatherDuration, 1);
                if (elapsed > gatherDuration) {
                    animationPhase = 'hold';
                    startTime = currentTime;
                }
            } else if (animationPhase === 'hold') {
                if (elapsed > holdDuration) {
                    animationPhase = 'scatter';
                    startTime = currentTime;
                    stars.forEach(star => {
                        star.x = Math.random() * width;
                        star.y = Math.random() * height;
                        star.arrived = false;
                        star.trail = [];
                    });
                }
            }

            stars.forEach(star => {
                star.update(progress);
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        function handleResize() {
            width = window.innerWidth;
            height = window.innerHeight;
            textCanvas.width = starCanvas.width = width;
            textCanvas.height = starCanvas.height = height;
            createStars();
        }

        window.addEventListener('resize', handleResize);

        createStars();
        animate();
    </script>
</body>
</html>
